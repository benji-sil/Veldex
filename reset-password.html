<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELDEX OS - Reset Password</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            bg: "#05080d",
            panel: "#0b0f14",
            panel2: "#10161d",
            line: "#23303a",
            cyan: "#2ddbde",
            cyanSoft: "rgba(45,219,222,0.12)",
            gold: "#f5c76a",
            textMain: "#e6edf3",
            textSoft: "#8a98a6"
          },
          fontFamily: {
            headline: ["Space Grotesk", "sans-serif"],
            body: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>

  <style>
    .scanlines::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.015) 0%,
        rgba(255,255,255,0.015) 50%,
        rgba(0,0,0,0.03) 50%,
        rgba(0,0,0,0.03) 100%
      );
      background-size: 100% 4px;
      opacity: 0.35;
    }

    .chamfered {
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .terminal-frame {
      position: relative;
    }

    .terminal-frame::before,
    .terminal-frame::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(45, 219, 222, 0.55);
      pointer-events: none;
    }

    .terminal-frame::before {
      top: 0;
      left: 0;
      border-top: 2px solid;
      border-left: 2px solid;
    }

    .terminal-frame::after {
      bottom: 0;
      right: 0;
      border-bottom: 2px solid;
      border-right: 2px solid;
    }
  </style>
</head>

<body class="bg-bg text-textMain font-body min-h-screen relative overflow-hidden">

  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(45,219,222,0.08),transparent_30%)]"></div>
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_bottom_right,rgba(245,199,106,0.06),transparent_30%)]"></div>

  <main class="scanlines relative min-h-screen flex items-center justify-center px-6">

    <div class="relative z-10 w-full max-w-md">

      <div class="text-center mb-8">
        <h1 class="font-headline text-4xl font-bold tracking-[0.22em] text-white mb-2">
          VELDEX
        </h1>
        <p class="uppercase tracking-[0.18em] text-[11px] text-textSoft">
          Password Recovery
        </p>
      </div>

      <section class="terminal-frame bg-panel border border-line px-6 py-7">
        <div class="space-y-5">
          <div id="reset-content">
            <p class="text-[11px] uppercase text-cyan mb-6 tracking-wider">Define New Access Credentials</p>

            <div class="space-y-4">
              <div>
                <label class="block mb-2 text-[10px] uppercase text-textSoft">New Password</label>
                <input id="newPasswordInput" type="password" placeholder="••••••••"
                  class="w-full bg-panel2 border border-line px-4 py-3 text-sm focus:border-cyan outline-none">
              </div>

              <div>
                <label class="block mb-2 text-[10px] uppercase text-textSoft">Confirm Password</label>
                <input id="confirmPasswordInput" type="password" placeholder="••••••••"
                  class="w-full bg-panel2 border border-line px-4 py-3 text-sm focus:border-cyan outline-none">
              </div>

              <button id="updatePasswordBtn" class="w-full bg-gold text-black py-4 uppercase chamfered">
                Update Password
              </button>
            </div>
          </div>

          <div id="error-message" class="hidden">
            <p class="text-sm text-red-500 mb-4" id="error-text">Invalid or expired link.</p>
            <a href="auth.html" class="inline-block border border-cyan text-cyan px-4 py-2 text-xs uppercase">
              Back to Login
            </a>
          </div>

          <p id="reset-status" class="text-sm text-textSoft"></p>
        </div>
      </section>
    </div>

  </main>

  <script src="./config/env.production.js"></script>
  <script type="module">

    import { supabase } from "./services/supabase.js";
    import { handleUpdatePassword } from "./services/authService.js";

    async function checkSession() {
      const { data, error } = await supabase.auth.getSession();
      
      if (error || !data.session) {
        document.getElementById("reset-content").classList.add("hidden");
        document.getElementById("error-message").classList.remove("hidden");
        if (error) {
          document.getElementById("error-text").innerText = "Erreur session : " + error.message;
        }
      } else {
        document.getElementById("updatePasswordBtn").addEventListener("click", handleUpdatePassword);
      }
    }

    checkSession();
  </script>
</body>
</html>
