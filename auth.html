<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELDEX OS - Auth</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            bg: "#05080d",
            panel: "#0b0f14",
            panel2: "#10161d",
            line: "#23303a",
            cyan: "#2ddbde",
            cyanSoft: "rgba(45,219,222,0.12)",
            gold: "#f5c76a",
            textMain: "#e6edf3",
            textSoft: "#8a98a6"
          },
          fontFamily: {
            headline: ["Space Grotesk", "sans-serif"],
            body: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>

  <style>
    .scanlines::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.015) 0%,
        rgba(255,255,255,0.015) 50%,
        rgba(0,0,0,0.03) 50%,
        rgba(0,0,0,0.03) 100%
      );
      background-size: 100% 4px;
      opacity: 0.35;
    }

    .chamfered {
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .terminal-frame {
      position: relative;
    }

    .terminal-frame::before,
    .terminal-frame::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(45, 219, 222, 0.55);
      pointer-events: none;
    }

    .terminal-frame::before {
      top: 0;
      left: 0;
      border-top: 2px solid;
      border-left: 2px solid;
    }

    .terminal-frame::after {
      bottom: 0;
      right: 0;
      border-bottom: 2px solid;
      border-right: 2px solid;
    }

    .tab-active {
      color: #2ddbde;
      border-bottom: 2px solid #2ddbde;
    }

    .tab-inactive {
      color: #8a98a6;
      border-bottom: 2px solid transparent;
    }
  </style>
</head>

<body class="bg-bg text-textMain font-body min-h-screen relative overflow-hidden">

  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(45,219,222,0.08),transparent_30%)]"></div>
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_bottom_right,rgba(245,199,106,0.06),transparent_30%)]"></div>

  <main id="auth-page" class="scanlines relative min-h-screen flex items-center justify-center px-6">

    <div class="relative z-10 w-full max-w-md">

      <div class="text-center mb-8">
        <h1 class="font-headline text-4xl font-bold tracking-[0.22em] text-white mb-2">
          VELDEX
        </h1>

        <p class="uppercase tracking-[0.18em] text-[11px] text-textSoft">
          Mining Intelligence Platform
        </p>

        <div class="mt-4 flex items-center justify-center gap-3 text-[10px] tracking-[0.16em] uppercase text-cyan">
          <span class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-cyan animate-pulse"></span>
            SYS.STATUS: ONLINE
          </span>
          <span class="text-textSoft">•</span>
          <span>SEC: ALPHA-9</span>
        </div>
      </div>

      <section class="terminal-frame bg-panel border border-line px-6 py-7">

        <div class="flex border-b border-line mb-6">
          <button id="loginTab" class="flex-1 pb-3 text-xs uppercase tab-active">
            Login
          </button>
          <button id="registerTab" class="flex-1 pb-3 text-xs uppercase tab-inactive">
            Register
          </button>
        </div>

        <div class="space-y-5">

          <div id="username-wrapper" class="hidden">
            <label class="block mb-2 text-[10px] uppercase text-textSoft">User ID</label>
            <input id="usernameInput" type="text" placeholder="ENTER ID"
              class="w-full bg-panel2 border border-line px-4 py-3 text-sm focus:border-cyan outline-none">
          </div>

          <div>
            <label class="block mb-2 text-[10px] uppercase text-textSoft">Email</label>
            <input id="emailInput" type="email" placeholder="USER@VELDEX.SYS"
              class="w-full bg-panel2 border border-line px-4 py-3 text-sm focus:border-cyan outline-none">
          </div>

          <div>
            <label class="block mb-2 text-[10px] uppercase text-textSoft">Password</label>
            <input id="passwordInput" type="password" placeholder="••••••••"
              class="w-full bg-panel2 border border-line px-4 py-3 text-sm focus:border-cyan outline-none">
            <div class="flex justify-end mt-2">
              <button id="resetTab" class="text-[10px] uppercase text-cyan hover:underline">
                Forgot password?
              </button>
            </div>
          </div>

          <div id="reset-form-wrapper" class="hidden space-y-5">
            <div class="flex items-center gap-2 mb-2">
              <button id="back-to-login" class="text-textSoft hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <span class="text-[10px] uppercase text-textSoft">Reset Access</span>
            </div>
            
            <div>
              <label class="block mb-2 text-[10px] uppercase text-textSoft">Email</label>
              <input id="resetEmailInput" type="email" placeholder="USER@VELDEX.SYS"
                class="w-full bg-panel2 border border-line px-4 py-3 text-sm focus:border-cyan outline-none">
            </div>

            <button id="sendResetLinkBtn" class="w-full bg-gold text-black py-4 uppercase chamfered">
              Send Reset Link
            </button>
          </div>

          <button id="loginBtn" class="w-full bg-gold text-black py-4 uppercase chamfered">
            Initiate Terminal
          </button>

          <button id="signupBtn" class="hidden w-full bg-gold text-black py-4 uppercase chamfered">
            Create Access ID
          </button>

          <button id="logoutBtn" class="w-full border border-cyan text-cyan py-3 uppercase">
            Disconnect
          </button>

          <p id="auth-status" class="text-sm text-textSoft"></p>

        </div>

      </section>
    </div>

  </main>

  <script>
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const resetTab = document.getElementById("resetTab");
    const resetFormWrapper = document.getElementById("reset-form-wrapper");
    const backToLogin = document.getElementById("back-to-login");
    const usernameWrapper = document.getElementById("username-wrapper");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const authInputs = document.querySelectorAll("#username-wrapper, #emailInput, #passwordInput, #resetTab, #loginBtn, #signupBtn, #logoutBtn");
    const tabContainer = document.querySelector(".flex.border-b.border-line.mb-6");

    function showLoginMode() {
      if (resetFormWrapper) resetFormWrapper.classList.add("hidden");
      if (tabContainer) tabContainer.classList.remove("hidden");
      authInputs.forEach(el => {
        if (el.id !== "username-wrapper" && el.id !== "signupBtn") {
          el.classList.remove("hidden");
          if (el.parentElement?.classList.contains("hidden")) el.parentElement.classList.remove("hidden");
        }
      });
      if (usernameWrapper) usernameWrapper.classList.add("hidden");
      if (signupBtn) signupBtn.classList.add("hidden");
      if (loginBtn) loginBtn.classList.remove("hidden");

      if (loginTab) loginTab.classList.add("tab-active");
      if (registerTab) registerTab.classList.remove("tab-active");
    }

    function showRegisterMode() {
      if (resetFormWrapper) resetFormWrapper.classList.add("hidden");
      if (tabContainer) tabContainer.classList.remove("hidden");
      authInputs.forEach(el => {
        if (el.id !== "loginBtn") {
          el.classList.remove("hidden");
          if (el.parentElement?.classList.contains("hidden")) el.parentElement.classList.remove("hidden");
        }
      });
      if (loginBtn) loginBtn.classList.add("hidden");
      if (usernameWrapper) usernameWrapper.classList.remove("hidden");
      if (signupBtn) signupBtn.classList.remove("hidden");

      if (registerTab) registerTab.classList.add("tab-active");
      if (loginTab) loginTab.classList.remove("tab-active");
    }

    function showResetMode() {
      if (resetFormWrapper) resetFormWrapper.classList.remove("hidden");
      if (tabContainer) tabContainer.classList.add("hidden");
      authInputs.forEach(el => {
        el.classList.add("hidden");
        if (el.id === "emailInput" || el.id === "passwordInput") {
          el.parentElement.classList.add("hidden");
        }
      });
    }

    if (loginTab) loginTab.addEventListener("click", showLoginMode);
    if (registerTab) registerTab.addEventListener("click", showRegisterMode);
    if (resetTab) {
      resetTab.addEventListener("click", (e) => {
        e.preventDefault();
        showResetMode();
      });
    }
    if (backToLogin) backToLogin.addEventListener("click", showLoginMode);

    showLoginMode();
  </script>

  <script type="module" src="./scripts/app.js"></script>
</body>
</html>
